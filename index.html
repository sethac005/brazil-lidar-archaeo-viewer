<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brazil LiDAR Archaeo Viewer — 3D + Solar Simulation</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Cesium.js"></script>
    <link rel="stylesheet" href="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Widgets/widgets.css" />
    <style>
        body { margin:0; padding:0; overflow:hidden; font-family: Arial, sans-serif; }
        #cesiumContainer { width:100vw; height:100vh; }
        .control-panel { position:absolute; top:10px; right:10px; background:#fff; padding:15px; border-radius:8px; box-shadow:0 0 15px rgba(0,0,0,0.3); width:280px; z-index:100; }
        input[type="range"] { width:100%; }
        button { margin:5px 0; width:100%; }
    </style>
</head>
<body>
    <div id="cesiumContainer"></div>

    <div class="control-panel">
        <h3>Brazil LiDAR Archaeo Viewer</h3>
        <p>Demo with public point cloud. Replace with Amazon data.</p>
        <label><input type="checkbox" id="pcToggle" checked> Point Cloud</label><br>
        <label>Hillshade Opacity: <span id="opacityVal">0.5</span></label>
        <input type="range" id="hillOpacity" min="0" max="1" step="0.05" value="0.5" oninput="updateOpacity(this)">
        <h4>Sun Simulation</h4>
        <label>Date: <span id="dateVal">172</span></label>
        <input type="range" id="dateSlider" min="1" max="365" value="172" oninput="updateSun()">
        <label>Time: <span id="timeVal">12</span></label>
        <input type="range" id="timeSlider" min="0" max="24" step="0.25" value="12" oninput="updateSun()">
        <button onclick="setSolstice(2)">Winter Solstice</button>
        <button onclick="setSolstice(1)">Summer Solstice</button>
        <button onclick="toggleShadows()">Toggle Shadows</button>
    </div>

    <script>
        Cesium.Ion.defaultAccessToken = '';
        const viewer = new Cesium.Viewer('cesiumContainer', {
            terrainProvider: Cesium.createWorldTerrain(),
            imageryProvider: new Cesium.ArcGisMapServerImageryProvider({url: 'https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer'}),
            shadows: true
        });
        viewer.scene.globe.enableLighting = true;

        let pointCloudLayer = null;
        function loadDemoPointCloud() {
            if (pointCloudLayer) viewer.scene.primitives.remove(pointCloudLayer);
            pointCloudLayer = viewer.scene.primitives.add(new Cesium.Cesium3DTileset({
                url: 'https://webimaging.lillemetropole.fr/externe/maillage/2016_mel_10cm/3dtiles/tileset.json'
            }));
        }
        document.getElementById('pcToggle').addEventListener('change', e => { if (e.target.checked) loadDemoPointCloud(); else if (pointCloudLayer) {viewer.scene.primitives.remove(pointCloudLayer); pointCloudLayer=null;} });
        loadDemoPointCloud();

        // Hillshade (demo using public or comment out)
        let hillshadeLayer = viewer.imageryLayers.addImageryProvider(new Cesium.UrlTemplateImageryProvider({
            url : 'https://tile.openstreetmap.org/{z}/{x}/{y}.png' , // placeholder, replace with real hillshade
            maximumLevel: 19
        }));
        hillshadeLayer.alpha = 0.5;

        function updateOpacity(slider) {
            hillshadeLayer.alpha = parseFloat(slider.value);
            document.getElementById('opacityVal').textContent = slider.value;
        }

        function updateSun() {
            const day = parseInt(document.getElementById('dateSlider').value);
            const hour = parseFloat(document.getElementById('timeSlider').value);
            const date = new Date(2026, 0, day);
            date.setHours(hour);
            viewer.clock.currentTime = Cesium.JulianDate.fromDate(date);
            document.getElementById('dateVal').textContent = day;
            document.getElementById('timeVal').textContent = hour;
        }

        window.setSolstice = function(type) {
            document.getElementById('dateSlider').value = (type === 1) ? 355 : 172;
            updateSun();
        };
        window.toggleShadows = () => viewer.shadows = !viewer.shadows;

        viewer.camera.flyTo({destination: Cesium.Cartesian3.fromDegrees(-55, -10, 1000000)});
    </script>
</body>
</html>
